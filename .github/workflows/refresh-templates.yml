name: Refresh template data

on:
  schedule:
    # Mondays 06:00 UTC (~ Beijing Mon 14:00)
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install scraper deps
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          # Built-in token gives 5000 req/h — enough for the search queries.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scraper/fetch_templates.py

      - name: Mirror data into web/
        run: |
          mkdir -p web/data
          cp data/templates.json web/data/templates.json

      - name: Commit if changed
        run: |
          if git diff --quiet -- data/templates.json web/data/templates.json; then
            echo "No template changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/templates.json web/data/templates.json
          git commit -m "chore(data): weekly template refresh"
          git push
